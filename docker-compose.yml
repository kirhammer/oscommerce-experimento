services:
  # ── Legacy stack (osCommerce 2.3.4.1 · Apache + PHP 7.4) ──────────────────
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./catalog:/var/www/html/catalog
    depends_on:
      - db
    environment:
      OSCOM_DB_HOST: db
      OSCOM_DB_NAME: oscommerce
      OSCOM_DB_USER: oscommerce
      OSCOM_DB_PASS: oscommerce

  # ── Shared database (used by legacy and modern stacks) ────────────────────
  db:
    image: mysql:5.7
    platform: linux/amd64
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      - --sql-mode=
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oscommerce
      MYSQL_USER: oscommerce
      MYSQL_PASSWORD: oscommerce
    volumes:
      - db_data:/var/lib/mysql
      # Seeds schema + sample data on first boot only (ignored once the
      # datadir exists), so a fresh clone works without the web installer.
      - ./catalog/install/oscommerce.sql:/docker-entrypoint-initdb.d/01-oscommerce.sql:ro
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

  # ── Modern stack (Laravel 11 API + React SPA behind an nginx gateway) ─────
  api:
    build: ./modern/api
    volumes:
      - ./modern/api:/var/www/html
    depends_on:
      - db

  frontend:
    build: ./modern/frontend

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./modern/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  db_data:
