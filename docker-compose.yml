services:
  web:
    build: .
    container_name: oscommerce_web
    ports:
      - "8080:80"
    volumes:
      - ./catalog:/var/www/html/catalog
    depends_on:
      - db
    environment:
      OSCOM_DB_HOST: db
      OSCOM_DB_NAME: oscommerce
      OSCOM_DB_USER: oscommerce
      OSCOM_DB_PASS: oscommerce

  db:
    image: mysql:5.7
    platform: linux/amd64
    container_name: oscommerce_db
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      - --sql-mode=
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: oscommerce
      MYSQL_USER: oscommerce
      MYSQL_PASSWORD: oscommerce
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: oscommerce_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
