server {
    listen 80;

    # REST API → Laravel via PHP-FPM. Every /api request is handled by the
    # front controller, so SCRIPT_FILENAME is fixed to the path inside the
    # api container (no shared code volume needed).
    location /api {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Everything else → the React SPA static build.
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
